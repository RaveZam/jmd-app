# E2E: the routes CREATION journey — create a route, add a province under it,
# add a store under that province, and confirm each persists across the
# real navigation. Creation only — no delete/rename paths (those stay at the
# cheaper hook/component layers).
#
# Prereqs (see notes in the chat / references/maestro-e2e.md):
#   - A dev build installed on a booted simulator:  npx expo run:ios
#   - Maestro CLI:  curl -Ls "https://get.maestro.mobile.dev" | bash
#   - Test credentials below (a real Supabase user for this app).
# Run:  maestro test .maestro/routes-create-flow.yaml
appId: com.ravenzam.agentapp
---
# Cold launch. clearState wipes the local DB so the run always starts from an
# empty routes list (and logs us out, so we sign in below). Omit clearState if
# you'd rather reuse an already-signed-in build.
- launchApp:
    clearState: true

# --- Sign in (the auth guard redirects a clean launch to the sign-in screen) ---
- assertVisible: "Welcome back"
- tapOn: "Email" # matches the field by its placeholder
- inputText: "agent@example.com" # TODO: a real test user for this app
- tapOn: "Password"
- inputText: "your-test-password" # TODO
- tapOn: "Sign in"

# --- We're on the Routes home; the create FAB confirms it ---
- assertVisible:
    id: "create-route-fab"

# --- Create a route ---
- tapOn:
    id: "create-route-fab"
- tapOn: "Enter route name" # the modal input (placeholder); autofocus + tap for safety
- inputText: "North Luzon"
- tapOn: "Create New Route"
- assertVisible: "North Luzon" # the new RouteCard

# --- Open the route, then add a province under it ---
- tapOn: "North Luzon"
- assertVisible: "Location" # banner add-location button = we're on the detail screen
- tapOn: "Location"
- tapOn: "e.g. Makati, Quezon City" # province name input (placeholder)
- inputText: "Pampanga"
- tapOn:
    text: "^Add$" # exact match so it doesn't hit the "Add Province..." title
- assertVisible: "Pampanga" # the new ProvinceCard

# --- Add a store under that province ---
# The "+" add-store button is icon-only with a per-UUID testID; match the
# stable prefix as a regex (there is only one province in this flow).
- tapOn:
    id: "province-add-store-.*"
- tapOn: "e.g. Guadalupe Market" # store name input (placeholder)
- inputText: "Aling Nena Store"
- tapOn:
    text: "^Add$" # exact match so it doesn't hit the "Add Store" title
- assertVisible: "Aling Nena Store" # the new StoreListRow — store persisted under the province
